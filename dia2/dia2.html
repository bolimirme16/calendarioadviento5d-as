<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Día 2 · Puzzle Deslizante (4x4)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e, #0a0a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .container {
            background: rgba(26, 31, 46, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px 16px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid #2affb6;
            box-shadow: 0 0 30px rgba(42, 255, 182, 0.2);
        }

        h2 {
            color: #88ffcc;
            margin: 0 0 5px;
            font-size: 1.4rem;
        }

        .sub {
            color: #ccffdd;
            font-size: 0.75rem;
            margin-bottom: 15px;
        }

        /* Miniatura */
        .preview-area {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .preview-btn {
            background: #335577;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-family: monospace;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .thumbnail {
            display: none;
            margin: 8px auto;
            width: 100px;
            height: 100px;
            border-radius: 20px;
            border: 2px solid #2affb6;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .thumbnail.visible {
            display: block;
        }

        /* TABLERO - RESPONSIVE, NO SE SALE */
        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background: #1a1f2a;
            padding: 8px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
        }

        .tile {
            background-color: #2a3a4a;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #88aaff;
            background-size: 400% 400%;
            background-repeat: no-repeat;
        }

        .tile:active {
            transform: scale(0.96);
        }

        .empty {
            background: #1a2a3a !important;
            background-image: none !important;
        }

        .message {
            margin: 15px 0;
            font-size: 1rem;
            color: #ffdd88;
            min-height: 65px;
            padding: 0 8px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            background: #ff6644;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.1s;
        }

        button:active {
            transform: scale(0.96);
        }

        .solve-btn {
            background: #33aa88;
        }

        footer {
            font-size: 10px;
            color: #6688aa;
            margin-top: 15px;
        }

        /* Modal imagen completa */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 30px;
            border: 3px solid #2affb6;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🧩 DÍA 2 · PUZZLE DESLIZANTE</h2>
    <div class="sub">(4x4) Mueve las fichas para recomponer la imagen</div>

    <div class="preview-area">
        <button id="togglePreviewBtn" class="preview-btn">🖼️ Mostrar miniatura</button>
        <button id="showFullImageBtn" class="preview-btn">🔍 Ver imagen completa</button>
    </div>
    <div id="thumbnail" class="thumbnail"></div>

    <div class="puzzle-board" id="puzzleBoard"></div>
    <div class="message" id="message"></div>

    <div class="buttons">
        <button id="shuffleBtn">🔀 MEZCLAR</button>
        <button id="solveBtn" class="solve-btn">🔓 RESOLVER</button>
    </div>
    <footer>💡 Haz clic en una ficha junto al hueco (✨) para moverla.</footer>
</div>

<!-- Modal imagen completa -->
<div id="imageModal" class="modal">
    <span class="modal-close" id="closeModal">&times;</span>
    <img id="fullImage" src="" alt="Imagen completa">
</div>

<script>
    // ========== CONFIGURACIÓN ==========
    const SIZE = 4;               // 4x4
    const EMPTY_VALUE = SIZE * SIZE - 1;  // 15
    let tiles = [];
    let emptyIndex = EMPTY_VALUE;
    const boardEl = document.getElementById('puzzleBoard');
    const messageDiv = document.getElementById('message');
    
    // Tu imagen local
    const IMG_URL = 'imagen2D.png';
    
    // Miniatura y modal
    const thumbnailDiv = document.getElementById('thumbnail');
    thumbnailDiv.style.backgroundImage = `url(${IMG_URL})`;
    thumbnailDiv.style.backgroundSize = 'cover';
    document.getElementById('fullImage').src = IMG_URL;
    
    // Toggle miniatura
    let thumbVisible = false;
    const toggleBtn = document.getElementById('togglePreviewBtn');
    toggleBtn.addEventListener('click', () => {
        thumbVisible = !thumbVisible;
        thumbnailDiv.classList.toggle('visible', thumbVisible);
        toggleBtn.innerText = thumbVisible ? '🖼️ Ocultar miniatura' : '🖼️ Mostrar miniatura';
    });
    
    // Modal imagen grande
    const modal = document.getElementById('imageModal');
    const showFullBtn = document.getElementById('showFullImageBtn');
    const closeModal = document.getElementById('closeModal');
    showFullBtn.onclick = () => modal.style.display = 'flex';
    closeModal.onclick = () => modal.style.display = 'none';
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    // ========== LÓGICA DEL PUZZLE ==========
    function initSolvedState() {
        tiles = Array.from({ length: SIZE * SIZE }, (_, i) => i);
        emptyIndex = EMPTY_VALUE;
    }
    
    function getNeighbors(idx) {
        const row = Math.floor(idx / SIZE);
        const col = idx % SIZE;
        const neighbors = [];
        if (row > 0) neighbors.push(idx - SIZE);
        if (row < SIZE - 1) neighbors.push(idx + SIZE);
        if (col > 0) neighbors.push(idx - 1);
        if (col < SIZE - 1) neighbors.push(idx + 1);
        return neighbors;
    }
    
    function swap(i, j) {
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    
    function isSolved() {
        for (let i = 0; i < tiles.length; i++) {
            if (tiles[i] !== i) return false;
        }
        return true;
    }
    
    function tryMove(tileIndex) {
        if (getNeighbors(emptyIndex).includes(tileIndex)) {
            swap(tileIndex, emptyIndex);
            emptyIndex = tileIndex;
            renderBoard();
            if (isSolved()) {
                // ✅ Resuelto manualmente: premio abrazo + chocolate
                messageDiv.innerHTML = '🎉 ¡PUZZLE COMPLETADO! 🎉<br>Te ganaste un abrazo 🤗 y un chocolate 🍫';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } else {
                messageDiv.innerHTML = '👍 Sigue moviendo las fichas...';
            }
            return true;
        }
        return false;
    }
    
    function shufflePuzzle() {
        for (let i = 0; i < 500; i++) {
            const neighbors = getNeighbors(emptyIndex);
            if (neighbors.length) {
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(emptyIndex, randomNeighbor);
                emptyIndex = randomNeighbor;
            }
        }
        renderBoard();
        messageDiv.innerHTML = '🔀 Puzzle mezclado. ¡A ordenar!';
    }
    
    function solvePuzzle() {
        initSolvedState();   // ordena directamente
        renderBoard();
        // ✅ Botón resolver: mensaje de "luego lo resolvemos" pero igual abrazo y chocolate
        messageDiv.innerHTML = '✨ Usaste el botón resolver... luego lo resolvemos juntos. ✨<br>Pero igual te doy un abrazo 🤗 y un chocolate 🍫';
        if (navigator.vibrate) navigator.vibrate(100);
    }
    
    function renderBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < tiles.length; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const piece = tiles[i];
            if (piece === EMPTY_VALUE) {
                tile.classList.add('empty');
                tile.innerHTML = '✨';
                tile.style.backgroundImage = 'none';
            } else {
                const row = Math.floor(piece / SIZE);
                const col = piece % SIZE;
                const posX = (col / (SIZE - 1)) * 100;
                const posY = (row / (SIZE - 1)) * 100;
                tile.style.backgroundImage = `url(${IMG_URL})`;
                tile.style.backgroundSize = `${SIZE * 100}% ${SIZE * 100}%`;
                tile.style.backgroundPosition = `${posX}% ${posY}%`;
                tile.innerHTML = '';
            }
            tile.addEventListener('click', (function(idx) {
                return () => tryMove(idx);
            })(i));
            boardEl.appendChild(tile);
        }
    }
    
    // Inicio
    initSolvedState();
    shufflePuzzle();
    
    // Botones
    document.getElementById('shuffleBtn').addEventListener('click', shufflePuzzle);
    document.getElementById('solveBtn').addEventListener('click', solvePuzzle);
</script>
</body>
</html>
