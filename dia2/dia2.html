<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Día 2 · Puzzle Deslizante (4x4)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e, #0a0a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(26, 31, 46, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid #2affb6;
            box-shadow: 0 0 30px rgba(42, 255, 182, 0.2);
        }

        h2 {
            color: #88ffcc;
            margin: 0 0 5px;
            font-size: 1.5rem;
        }

        .sub {
            color: #ccffdd;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        /* Miniatura de la imagen (activable/desactivable) */
        .preview-area {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        .preview-btn {
            background: #335577;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 40px;
            font-family: monospace;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 0 5px;
        }
        .thumbnail {
            display: none;
            margin: 10px auto;
            width: 120px;
            height: 120px;
            border-radius: 20px;
            border: 2px solid #2affb6;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .thumbnail.visible {
            display: block;
        }

        /* Tablero del puzzle */
        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background: #1a1f2a;
            padding: 10px;
            border-radius: 28px;
            width: min(80vw, 80vh);
            height: min(80vw, 80vh);
            margin: 0 auto;
        }

        .tile {
            background-size: 400% 400%;
            background-color: #2a3a4a;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #88aaff;
        }

        .tile:active {
            transform: scale(0.96);
        }

        .empty {
            background: #1a2a3a !important;
            background-image: none !important;
        }

        .message {
            margin: 15px 0;
            font-size: 1.1rem;
            color: #ffdd88;
            min-height: 60px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            background: #ff6644;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.1s;
        }

        button:active {
            transform: scale(0.96);
        }

        .solve-btn {
            background: #33aa88;
        }

        footer {
            font-size: 10px;
            color: #6688aa;
            margin-top: 15px;
        }

        /* Modal para imagen grande */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 30px;
            border: 3px solid #2affb6;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🧩 DÍA 2 · PUZZLE DESLIZANTE</h2>
    <div class="sub">(4x4) Mueve las fichas hasta recomponer la imagen</div>

    <div class="preview-area">
        <button id="togglePreviewBtn" class="preview-btn">🖼️ Mostrar miniatura</button>
        <button id="showFullImageBtn" class="preview-btn">🔍 Ver imagen completa</button>
    </div>
    <div id="thumbnail" class="thumbnail"></div>

    <div class="puzzle-board" id="puzzleBoard"></div>
    <div class="message" id="message"></div>

    <div class="buttons">
        <button id="shuffleBtn">🔀 MEZCLAR</button>
        <button id="solveBtn" class="solve-btn">🔓 RESOLVER</button>
    </div>
    <footer>💡 Haz clic en una ficha junto al hueco (✨) para moverla.</footer>
</div>

<!-- Modal para imagen completa -->
<div id="imageModal" class="modal">
    <span class="modal-close" id="closeModal">&times;</span>
    <img id="fullImage" src="" alt="Imagen completa">
</div>

<script>
    // ================= CONFIGURACIÓN =================
    const SIZE = 4;          // 4x4 = 16 fichas (la última es el hueco)
    const EMPTY_VALUE = SIZE * SIZE - 1;  // índice 15 (0-index)
    let tiles = [];          // orden actual: cada número representa la ficha (0..15)
    let emptyIndex = EMPTY_VALUE;
    const board = document.getElementById('puzzleBoard');
    const messageDiv = document.getElementById('message');
    
    // Usa TU IMAGEN LOCAL (debe estar en misma carpeta)
    const IMG_URL = 'imagen2D.png';
    
    // Precargar la miniatura y modal
    const thumbnailDiv = document.getElementById('thumbnail');
    thumbnailDiv.style.backgroundImage = `url(${IMG_URL})`;
    thumbnailDiv.style.backgroundSize = 'cover';
    const fullImage = document.getElementById('fullImage');
    fullImage.src = IMG_URL;
    
    // Toggle miniatura
    let thumbnailVisible = false;
    const togglePreviewBtn = document.getElementById('togglePreviewBtn');
    togglePreviewBtn.addEventListener('click', () => {
        thumbnailVisible = !thumbnailVisible;
        if (thumbnailVisible) {
            thumbnailDiv.classList.add('visible');
            togglePreviewBtn.innerText = '🖼️ Ocultar miniatura';
        } else {
            thumbnailDiv.classList.remove('visible');
            togglePreviewBtn.innerText = '🖼️ Mostrar miniatura';
        }
    });
    
    // Modal imagen completa
    const modal = document.getElementById('imageModal');
    const showFullImageBtn = document.getElementById('showFullImageBtn');
    const closeModal = document.getElementById('closeModal');
    showFullImageBtn.onclick = () => { modal.style.display = 'flex'; };
    closeModal.onclick = () => { modal.style.display = 'none'; };
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    // ========== LÓGICA DEL PUZZLE ==========
    function initSolvedState() {
        tiles = [];
        for (let i = 0; i < SIZE * SIZE; i++) {
            tiles.push(i);
        }
        emptyIndex = EMPTY_VALUE;
    }
    
    // Obtener índices de vecinos (arriba, abajo, izquierda, derecha)
    function getNeighbors(idx) {
        const row = Math.floor(idx / SIZE);
        const col = idx % SIZE;
        const neighbors = [];
        if (row > 0) neighbors.push(idx - SIZE);
        if (row < SIZE - 1) neighbors.push(idx + SIZE);
        if (col > 0) neighbors.push(idx - 1);
        if (col < SIZE - 1) neighbors.push(idx + 1);
        return neighbors;
    }
    
    // Intercambiar dos posiciones
    function swap(i, j) {
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    
    // Mover ficha si es adyacente al hueco
    function tryMove(tileIndex) {
        if (getNeighbors(emptyIndex).includes(tileIndex)) {
            swap(tileIndex, emptyIndex);
            emptyIndex = tileIndex;
            renderBoard();
            if (isSolved()) {
                messageDiv.innerHTML = '🎉 ¡PUZZLE COMPLETADO! 🎉<br>🍫 ¡Ganaste un chocolate! 🍫';
                if (navigator.vibrate) navigator.vibrate(200);
            } else {
                messageDiv.innerHTML = '👍 Sigue moviendo...';
            }
            return true;
        }
        return false;
    }
    
    function isSolved() {
        for (let i = 0; i < tiles.length; i++) {
            if (tiles[i] !== i) return false;
        }
        return true;
    }
    
    // Mezclar mediante movimientos aleatorios (siempre resoluble)
    function shufflePuzzle() {
        for (let i = 0; i < 500; i++) {
            const neighbors = getNeighbors(emptyIndex);
            if (neighbors.length) {
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(emptyIndex, randomNeighbor);
                emptyIndex = randomNeighbor;
            }
        }
        renderBoard();
        messageDiv.innerHTML = '🔀 Puzzle mezclado. ¡A ordenar!';
    }
    
    // Resolver automáticamente (ordenar)
    function solvePuzzle() {
        initSolvedState();
        renderBoard();
        messageDiv.innerHTML = '✨ ¡RESUELTO! ✨<br>✅ Imagen completa restaurada.';
        if (navigator.vibrate) navigator.vibrate(100);
    }
    
    // Renderizar el tablero con la imagen fragmentada
    function renderBoard() {
        board.innerHTML = '';
        for (let i = 0; i < tiles.length; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const pieceValue = tiles[i];
            if (pieceValue === EMPTY_VALUE) {
                tile.classList.add('empty');
                tile.innerHTML = '✨';
                tile.style.backgroundImage = 'none';
            } else {
                // Calcular posición del fragmento en la imagen original
                const row = Math.floor(pieceValue / SIZE);
                const col = pieceValue % SIZE;
                const posX = (col / (SIZE - 1)) * 100;
                const posY = (row / (SIZE - 1)) * 100;
                tile.style.backgroundImage = `url(${IMG_URL})`;
                tile.style.backgroundSize = `${SIZE * 100}% ${SIZE * 100}%`;
                tile.style.backgroundPosition = `${posX}% ${posY}%`;
                tile.innerHTML = '';
            }
            tile.addEventListener('click', (function(idx) {
                return function() { tryMove(idx); };
            })(i));
            board.appendChild(tile);
        }
    }
    
    // Inicialización
    initSolvedState();
    shufflePuzzle();   // arranca mezclado
    
    // Botones
    document.getElementById('shuffleBtn').addEventListener('click', () => {
        shufflePuzzle();
    });
    document.getElementById('solveBtn').addEventListener('click', () => {
        solvePuzzle();
    });
</script>
</body>
</html>
