
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Día 2 · Cubo de Cristal · Calendario Tecnológico</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            background: #000;
            color: white;
        }
        
        /* Info HUD */
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px;
            font-size: 14px;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        
        .touch-glow {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        @media (max-width: 600px) {
            .info-panel { font-size: 10px; padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="instruction">✨ TOCA EL CUBO → BRILLO ✨</div>
    <div class="info-panel">
        ⬩ CRISTAL DE NUESTRO MUNDO ⬩  ||  FOTOS · JUEGOS · BASKET  ||  <span id="gyro-status">📱 giroscopio activo</span>
    </div>
    <div id="glowEffect" class="touch-glow"></div>

    <!-- Importamos Three.js y los add-ons necesarios -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- INICIALIZACIÓN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.008); // niebla sutil
        
        // Cámara: perspectiva ajustada para móvil
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2.5, 2, 3.5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // sombras suaves
        renderer.setClearColor(0x010118, 1);
        document.body.appendChild(renderer.domElement);
        
        // --- CONTROLES (táctiles + ratón, pero permitimos giroscopio después)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // inercia
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);
        
        // --- LUCES PARA REFLEJOS DEL CRISTAL ---
        // Luz ambiental suave
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luz principal direccional
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(2, 3, 4);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        scene.add(mainLight);
        
        // Luz de relleno cálida desde abajo
        const fillLight = new THREE.PointLight(0xcc9966, 0.5);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);
        
        // Luz de neón azul para reflejos high-tech
        const neonLight = new THREE.PointLight(0x33aaff, 0.8);
        neonLight.position.set(1.5, 1, 2);
        scene.add(neonLight);
        
        // Luz trasera para brillar bordes
        const backLight = new THREE.PointLight(0xff77aa, 0.4);
        backLight.position.set(-1, 0.5, -2);
        scene.add(backLight);
        
        // Partículas estrellas flotantes (ambiente)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.08, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- EL CUBO DE CRISTAL ---
        // Creamos un cubo con MeshPhysicalMaterial (transmisión tipo vidrio)
        const geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
        
        // Texturas para las caras: foto, iconos, palabras
        // Usaremos CanvasTexture para generar dinámicamente el contenido de cada cara
        function createFaceTexture(textOrImage, bgColor, textColor = '#ffffff', iconUrl = null) {
            // Si es una imagen externa, se manejará aparte; aquí hacemos canvas versátil
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Fondo con gradiente
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, bgColor);
            grad.addColorStop(1, '#223344');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Marco tecnológico
            ctx.strokeStyle = '#88ffcc';
            ctx.lineWidth = 12;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            
            // Texto principal
            ctx.fillStyle = textColor;
            ctx.font = `Bold ${canvas.width * 0.08}px "Courier New", monospace`;
            ctx.shadowBlur = 0;
            ctx.fillText(textOrTexture, canvas.width/2 - 100, canvas.height/2);
            
            // Si hay icono (simulado con emoji o texto)
            if (iconUrl && iconUrl.startsWith('🏀')) {
                ctx.font = `${canvas.width * 0.2}px "Segoe UI Emoji"`;
                ctx.fillText(iconUrl, canvas.width/2 - 60, canvas.height/2 + 80);
            } else if (iconUrl && iconUrl.startsWith('🎮')) {
                ctx.font = `${canvas.width * 0.2}px "Segoe UI Emoji"`;
                ctx.fillText(iconUrl, canvas.width/2 - 60, canvas.height/2 + 80);
            }
            
            return new THREE.CanvasTexture(canvas);
        }
        
        // Creamos texturas personalizadas para cada cara (6 caras)
        // Cara 1: Foto de ustedes (simulada, pero puedes poner URL real)
        const textureFront = (() => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a2a3a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffcc88';
            ctx.font = '28px monospace';
            ctx.fillText("📸 Nuestra foto", 150, 250);
            ctx.fillText("❤️ Diciembre 2025", 140, 350);
            // Si tienes una imagen real, puedes cargarla con THREE.ImageUtils.loadTexture, pero mejor para evitar CORS usar canvas
            // Para reemplazar con foto real, descomenta y comenta lo anterior:
            // const img = new Image(); img.src = '../assets/foto-pareja.jpg'; return new THREE.CanvasTexture(canvas); (requiere manejo async)
            return new THREE.CanvasTexture(canvas);
        })();
        
        // Cara 2: Mobile Legends icon
        const textureMLBB = createFaceTexture('MLBB', '#2c5a2e', '#ffd966', '🎮');
        // Cara 3: Basketball Fénix
        const textureBasket = createFaceTexture('FÉNIX BC', '#8b3c1c', '#ffaa66', '🏀');
        // Cara 4: Palabra clave "SINCRONÍA"
        const textureSync = createFaceTexture('SINCRONÍA', '#1a3366', '#aaffdd', '⚡');
        // Cara 5: "INFINITO"
        const textureInfinity = createFaceTexture('∞ INFINITO ∞', '#331c3a', '#ff99ff', '🔮');
        // Cara 6: "TULCÁN"
        const textureTulcan = createFaceTexture('TULCÁN · 2025', '#226655', '#ccffaa', '🗺️');
        
        const materials = [
            new THREE.MeshPhysicalMaterial({ map: textureFront, color: 0xffffff, metalness: 0.9, roughness: 0.2, transparent: true, opacity: 0.92, side: THREE.DoubleSide }), // derecha (x+)
            new THREE.MeshPhysicalMaterial({ map: textureMLBB, color: 0xffffff, metalness: 0.85, roughness: 0.25, transparent: true, opacity: 0.92, side: THREE.DoubleSide }), // izquierda
            new THREE.MeshPhysicalMaterial({ map: textureBasket, color: 0xffffff, metalness: 0.9, roughness: 0.2, transparent: true, opacity: 0.92, side: THREE.DoubleSide }), // arriba
            new THREE.MeshPhysicalMaterial({ map: textureSync, color: 0xffffff, metalness: 0.9, roughness: 0.2, transparent: true, opacity: 0.92, side: THREE.DoubleSide }), // abajo
            new THREE.MeshPhysicalMaterial({ map: textureInfinity, color: 0xffffff, metalness: 0.9, roughness: 0.2, transparent: true, opacity: 0.92, side: THREE.DoubleSide }), // frente (z+)
            new THREE.MeshPhysicalMaterial({ map: textureTulcan, color: 0xffffff, metalness: 0.9, roughness: 0.2, transparent: true, opacity: 0.92, side: THREE.DoubleSide })  // atrás
        ];
        
        const cube = new THREE.Mesh(geometry, materials);
        cube.castShadow = true;
        cube.receiveShadow = false;
        scene.add(cube);
        
        // Añadir un wireframe brillante alrededor para efecto technological
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0x88ddff, linewidth: 1 });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        cube.add(wireframe);
        
        // --- ANIMACIÓN DE ROTACIÓN LENTA (base) ---
        let time = 0;
        
        // --- INTERACCIÓN: TOCAR EL CUBO PRODUCE BRILLO ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onTouchOrClick(event) {
            // Calcular coordenadas normalizadas (-1 a +1)
            const rect = renderer.domElement.getBoundingClientRect();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
                event.preventDefault();
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(cube);
            
            if (intersects.length > 0) {
                // Efecto de brillo intenso
                neonLight.intensity = 1.8;
                backLight.intensity = 1.2;
                mainLight.intensity = 2.0;
                setTimeout(() => {
                    neonLight.intensity = 0.8;
                    backLight.intensity = 0.4;
                    mainLight.intensity = 1.2;
                }, 300);
                
                // Mostrar efecto de toque en pantalla
                const glowDiv = document.getElementById('glowEffect');
                glowDiv.style.left = clientX + 'px';
                glowDiv.style.top = clientY + 'px';
                glowDiv.style.opacity = '1';
                setTimeout(() => { glowDiv.style.opacity = '0'; }, 400);
                
                // Pequeña vibración (si el dispositivo lo soporta)
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }
        
        window.addEventListener('click', onTouchOrClick);
        window.addEventListener('touchstart', onTouchOrClick, { passive: false });
        
        // --- GIROSCOPIO: Mover reflejos según inclinación ---
        let gyroAvailable = false;
        let gamma = 0, beta = 0;
        
        function handleOrientation(event) {
            gamma = event.gamma;  // -90 a 90 (inclinación izquierda-derecha)
            beta = event.beta;    // -180 a 180 (inclinación adelante-atrás)
            // Mover luces relativamente
            // Luz principal se mueve con la inclinación
            const lightX = Math.sin(gamma * Math.PI / 180) * 2;
            const lightY = Math.sin(beta * Math.PI / 180) * 1.5;
            mainLight.position.x = 2 + lightX;
            mainLight.position.y = 3 - lightY;
            neonLight.position.x = 1.5 + lightX * 0.5;
            neonLight.position.z = 2 + (gamma * 0.02);
            
            // También rotar ligeramente el campo de estrellas para sensación inmersiva
            stars.rotation.x = beta * 0.005;
            stars.rotation.y = gamma * 0.005;
            
            document.getElementById('gyro-status').innerHTML = '🎛️ reflejos en movimiento';
        }
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroAvailable = true;
            document.getElementById('gyro-status').innerHTML = '🔄 giroscopio activo · mueve el móvil';
        } else {
            document.getElementById('gyro-status').innerHTML = '⚙️ giroscopio no soportado';
        }
        
        // --- ANIMACIÓN Y RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // Rotación autónoma muy sutil (0.2 grados por frame) solo si no se interactúa manualmente
            // Para no interferir con OrbitControls, solo rotamos el cubo si el usuario no está tocando?
            // En este caso dejamos que OrbitControls maneje la cámara, pero queremos que el cubo gire sobre sí mismo.
            // Para que gire independiente de la cámara, rotamos el cubo directamente.
            cube.rotation.y += 0.002;
            cube.rotation.x = Math.sin(time * 0.3) * 0.1;
            cube.rotation.z = Math.cos(time * 0.2) * 0.05;
            
            // Las estrellas se mueven muy lentamente
            stars.rotation.y += 0.0005;
            
            // Actualizar controles si se usan (para que la cámara tenga inercia)
            controls.update();
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Ajustar al cambio de tamaño de ventana
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Mensaje en consola para ingeniería
        console.log('%c✨ Día 2: Cubo de Cristal activo | Three.js + Giroscopio', 'color: #88ffaa; font-size: 16px');
    </script>
</body>
</html>
