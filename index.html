
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Día 1 · Rasca tu sorpresa · Calendario Tecnológico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita seleccionar texto mientras rasca */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor principal estilo "arcade" */
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 20px;
            border-radius: 32px;
            background: #1a1a1a;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 16px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            cursor: grab;
            touch-action: none; /* Mejor para eventos táctiles */
            box-shadow: 0 0 0 2px #2a2a2a, 0 10px 25px rgba(0,0,0,0.3);
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Info bar estilo HUD */
        .info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 10px;
            padding: 0 12px;
            color: #8bffa0;
            text-shadow: 0 0 3px #00aa33;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .progress-text {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
        }

        .reset-btn {
            background: none;
            border: 1px solid #3a3a3a;
            color: #ccc;
            font-family: monospace;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:active {
            background: #2a2a2a;
            color: #8bffa0;
        }

        footer {
            text-align: center;
            font-size: 10px;
            color: #4a4a4a;
            margin-top: 16px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="info">
        <span>🔧 SCRATCH-01 // NIVEL: INGENIERÍA</span>
        <span class="progress-text">✧ RESIDUO: <span id="percent">100</span>%</span>
    </div>
    <canvas id="scratchCanvas" width="600" height="600"></canvas>
    <div style="display: flex; justify-content: center; margin-top: 12px;">
        <button class="reset-btn" id="resetBtn">⟳ REINICIAR MÁSCARA</button>
    </div>
    <footer>desliza el dedo · descubre el recuerdo</footer>
</div>

<script>
    (function(){
        // ---------- CONFIGURACIÓN ----------
        // La imagen que se oculta debajo (foto de ustedes + mensaje)
        // Puedes cambiar esta URL por cualquier imagen (JPG/PNG). 
        // Si la pones local, súbela en la misma carpeta.
        const HIDDEN_IMAGE_URL = 'https://picsum.photos/id/64/600/600'; // ⚠️ REEMPLAZA con tu foto real
        // La máscara metálica (gris oscuro / efecto rasca)
        const MASK_COLOR = '#2c2e3a';
        // Patrón opcional de puntos metálicos (se dibuja con ruido)
        
        // Tamaño del pincel (rasca)
        const BRUSH_RADIUS = 28;
        
        // Obtener canvas y contexto
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        
        // Variables de estado
        let hiddenImg = null;      // Imagen fondo (la sorpresa)
        let isDragging = false;
        let lastX = 0, lastY = 0;
        
        // Datos de la máscara (capa que se borra)
        let maskImageData = null;   // ImageData de la capa de máscara
        let currentMaskCanvas = null; // canvas auxiliar para manipular la máscara
        
        // Para mostrar el porcentaje restante
        const percentSpan = document.getElementById('percent');
        
        // ---------- 1. Crear máscara metálica con "polvo / grunge" ----------
        function generateMetalMask(width, height) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = width;
            offCanvas.height = height;
            const offCtx = offCanvas.getContext('2d');
            
            // Fondo base metálico oscuro
            offCtx.fillStyle = MASK_COLOR;
            offCtx.fillRect(0, 0, width, height);
            
            // Efecto de "polvo" y brillo metálico: puntos aleatorios + textura
            for (let i = 0; i < 1800; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const radius = Math.random() * 1.6;
                const alpha = Math.random() * 0.35;
                // luz metálica
                const grayVal = 80 + Math.random() * 100;
                offCtx.beginPath();
                offCtx.arc(x, y, radius, 0, Math.PI * 2);
                offCtx.fillStyle = `rgba(${grayVal}, ${grayVal+20}, ${grayVal-30}, ${alpha})`;
                offCtx.fill();
            }
            
            // pequeñas líneas / rayaduras falsas (efecto industrial)
            offCtx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 300; i++) {
                offCtx.beginPath();
                const startX = Math.random() * width;
                const startY = Math.random() * height;
                offCtx.moveTo(startX, startY);
                offCtx.lineTo(startX + (Math.random() - 0.5) * 12, startY + (Math.random() - 0.5) * 12);
                offCtx.lineWidth = Math.random() * 2.5;
                offCtx.strokeStyle = `rgba(210, 210, 240, ${Math.random() * 0.4})`;
                offCtx.stroke();
            }
            
            // restaurar comp
            offCtx.globalCompositeOperation = 'source-over';
            
            // Detalle extra: pequeños "copos" de polvo que caen visualmente (estático)
            for (let i = 0; i < 400; i++) {
                offCtx.fillStyle = `rgba(70, 70, 90, ${Math.random() * 0.5})`;
                offCtx.fillRect(Math.random() * width, Math.random() * height, 1.5, 1.5);
            }
            
            return offCanvas;
        }
        
        // ---------- 2. Inicializar todo (cargar imagen fondo y máscara) ----------
        function initScratch() {
            const width = canvas.width;
            const height = canvas.height;
            
            // Crear canvas para la máscara mutable
            currentMaskCanvas = document.createElement('canvas');
            currentMaskCanvas.width = width;
            currentMaskCanvas.height = height;
            
            // Generar máscara metálica original
            const originalMaskCanvas = generateMetalMask(width, height);
            const maskCtx = currentMaskCanvas.getContext('2d');
            maskCtx.drawImage(originalMaskCanvas, 0, 0);
            
            // Guardar imagen de máscara (para reiniciar después)
            window._originalMaskData = maskCtx.getImageData(0, 0, width, height);
            
            // Dibujar la escena inicial: fondo oculto + máscara encima
            drawFullScene();
            updatePercent();
        }
        
        // Dibuja todo: imagen oculta debajo, encima la máscara actual
        function drawFullScene() {
            if (!hiddenImg) return;
            
            const w = canvas.width;
            const h = canvas.height;
            
            // 1. Limpiar canvas principal y dibujar la imagen secreta (el regalo)
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(hiddenImg, 0, 0, w, h);
            
            // 2. Dibujar la MÁSCARA encima (si existe currentMaskCanvas)
            if (currentMaskCanvas) {
                ctx.drawImage(currentMaskCanvas, 0, 0);
            }
        }
        
        // ---------- 3. Algoritmo de "rascar" (borrar en la máscara) ----------
        function scratchAt(x, y, radius) {
            if (!currentMaskCanvas) return;
            
            const maskCtx = currentMaskCanvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            
            // Ajustar coordenadas relativas al canvas (por si el CSS escala)
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let canvasX = (x - rect.left) * scaleX;
            let canvasY = (y - rect.top) * scaleY;
            
            // Validar límites
            if (canvasX < 0 || canvasX > w || canvasY < 0 || canvasY > h) return;
            
            // Efecto de "polvo que cae": antes de borrar, dibujamos partículas efímeras (simulación)
            addDustEffect(canvasX, canvasY, radius);
            
            // Borrar la máscara con modo destination-out (hace agujeros transparentes)
            maskCtx.save();
            maskCtx.globalCompositeOperation = 'destination-out';
            maskCtx.beginPath();
            maskCtx.arc(canvasX, canvasY, radius, 0, Math.PI * 2);
            maskCtx.fillStyle = 'rgba(0,0,0,1)';
            maskCtx.fill();
            
            // Pequeño degradado suave en bordes para que no sea un corte tan duro
            maskCtx.globalCompositeOperation = 'destination-out';
            for (let r = radius * 0.6; r <= radius; r += 3) {
                maskCtx.beginPath();
                maskCtx.arc(canvasX, canvasY, r, 0, Math.PI * 2);
                maskCtx.fillStyle = `rgba(0,0,0,${0.2 * (1 - (r-radius)/radius)})`;
                maskCtx.fill();
            }
            maskCtx.restore();
            
            // Redibujar la escena completa
            drawFullScene();
            updatePercent();
        }
        
        // EFECTO de POLVO que se levanta al rascar (visual)
        function addDustEffect(cx, cy, radius) {
            // Creamos un canvas temporal sobre el principal para unas partículas que desaparecen
            const tempCtx = ctx;
            const dustCount = 28;
            for (let i = 0; i < dustCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * radius * 0.9;
                const offX = cx + Math.cos(angle) * dist;
                const offY = cy + Math.sin(angle) * dist;
                const size = Math.random() * 3 + 1;
                const gray = 150 + Math.random() * 80;
                
                tempCtx.fillStyle = `rgba(${gray}, ${gray-40}, ${gray-70}, 0.9)`;
                tempCtx.beginPath();
                tempCtx.arc(offX, offY, size, 0, Math.PI*2);
                tempCtx.fill();
            }
            // estos destellos se borran al redibujar el frame siguiente, pero como drawFullScene se llama después,
            // los dibujamos justo antes? Para que se vea el polvo fugaz, lo haremos después de actualizar pero rápido.
            // Un truco: pedir un frame para limpiar el polvo después de 100ms
            const dustCanvas = canvas;
            const dustOverlay = () => {
                drawFullScene();  // restaura escena (elimina polvo)
            };
            setTimeout(dustOverlay, 120);
            // pero para que el polvo se vea un instante, llamamos drawFullScene después del timeout.
            // pero no queremos doble redibujado instantáneo. Mejor guardamos estado:
            // En realidad ya se redibujó en scratchAt -> drawFullScene, y justo después se ejecuta dustOverlay
            // Así que el polvo permanece 120ms, luego desaparece.
        }
        
        // Calcular porcentaje de máscara restante (píxeles no transparentes)
        function updatePercent() {
            if (!currentMaskCanvas) return;
            const w = canvas.width;
            const h = canvas.height;
            const maskCtx = currentMaskCanvas.getContext('2d');
            const imgData = maskCtx.getImageData(0, 0, w, h);
            const data = imgData.data;
            let opaqueCount = 0;
            // analizamos canal alpha
            for (let i = 3; i < data.length; i += 4) {
                if (data[i] > 10) opaqueCount++;
            }
            const totalPixels = w * h;
            let percentRemain = (opaqueCount / totalPixels) * 100;
            percentRemain = Math.max(0, Math.min(100, percentRemain));
            const percentInt = Math.floor(percentRemain);
            percentSpan.innerText = percentInt;
            
            // Si se rascó más del 70% se puede añadir un pequeño brillo (solo estético)
            if (percentInt < 35) {
                canvas.style.boxShadow = "0 0 0 2px gold, 0 0 15px rgba(255,215,0,0.4)";
            } else {
                canvas.style.boxShadow = "0 0 0 2px #2a2a2a, 0 10px 25px rgba(0,0,0,0.3)";
            }
        }
        
        // Reiniciar máscara completa (volver a estado original)
        function resetMask() {
            if (!currentMaskCanvas || !window._originalMaskData) return;
            const maskCtx = currentMaskCanvas.getContext('2d');
            maskCtx.putImageData(window._originalMaskData, 0, 0);
            drawFullScene();
            updatePercent();
            // Pequeña vibración si se desea
        }
        
        // ---------- 4. Eventos táctiles y ratón (soporte móvil + pc) ----------
        function handleStart(e) {
            e.preventDefault();
            isDragging = true;
            const point = getEventPoint(e);
            lastX = point.x;
            lastY = point.y;
            scratchAt(lastX, lastY, BRUSH_RADIUS);
        }
        
        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const point = getEventPoint(e);
            const currentX = point.x;
            const currentY = point.y;
            
            // Interpolar entre puntos para un rascado suave
            const distance = Math.hypot(currentX - lastX, currentY - lastY);
            if (distance > 0) {
                const steps = Math.ceil(distance / 6);
                for (let step = 0; step <= steps; step++) {
                    const t = step / steps;
                    const interpX = lastX + (currentX - lastX) * t;
                    const interpY = lastY + (currentY - lastY) * t;
                    scratchAt(interpX, interpY, BRUSH_RADIUS);
                }
            } else {
                scratchAt(currentX, currentY, BRUSH_RADIUS);
            }
            
            lastX = currentX;
            lastY = currentY;
        }
        
        function handleEnd(e) {
            isDragging = false;
            e.preventDefault();
        }
        
        function getEventPoint(e) {
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            return { x: clientX, y: clientY };
        }
        
        // ---------- 5. Cargar imagen oculta (sorpresa) ----------
        function loadHiddenImage(url) {
            const img = new Image();
            img.crossOrigin = "Anonymous"; // si usas imágenes externas con CORS amigable
            img.onload = () => {
                hiddenImg = img;
                // Una vez cargada la imagen, inicializamos todo el sistema
                initScratch();
            };
            img.onerror = () => {
                console.warn("No se pudo cargar la imagen, usando imagen de fallo con mensaje de texto");
                // Fallback: generar un canvas con texto y foto por defecto (nunca fallar)
                const fallbackCanvas = document.createElement('canvas');
                fallbackCanvas.width = 600;
                fallbackCanvas.height = 600;
                const fCtx = fallbackCanvas.getContext('2d');
                fCtx.fillStyle = '#0b1a2e';
                fCtx.fillRect(0, 0, 600, 600);
                fCtx.fillStyle = '#ffb347';
                fCtx.font = 'bold 28px "Courier New"';
                fCtx.shadowBlur = 0;
                fCtx.fillText("❤️ SORPRESA TECNO ❤️", 130, 280);
                fCtx.font = '18px monospace';
                fCtx.fillStyle = '#bbffdd';
                fCtx.fillText("Eres mi mejor línea de código", 160, 380);
                fCtx.fillText("🎮 + 🏀 = ♾️", 230, 470);
                const fallbackImg = new Image();
                fallbackImg.src = fallbackCanvas.toDataURL();
                fallbackImg.onload = () => {
                    hiddenImg = fallbackImg;
                    initScratch();
                };
            };
            img.src = url;
        }
        
        // /////// INICIO ////////
        // Reemplaza esta URL con una FOTO REAL de ustedes (o imagen que quieras)
        // Si tienes la imagen en tu proyecto, pon la ruta: './foto-secreta.jpg'
        const FOTO_REAL = './tu-foto-secreta.jpg';   // <--- CAMBIAR por imagen REAL
        // Para testing con foto de placeholder, descomenta la línea de abajo y comenta la de arriba si no tienes imagen local
        // const FOTO_REAL = 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=600&h=600&fit=crop';
        
        loadHiddenImage(FOTO_REAL);
        
        // Configurar eventos UI
        function bindEvents() {
            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            
            canvas.addEventListener('touchstart', handleStart, { passive: false });
            canvas.addEventListener('touchmove', handleMove, { passive: false });
            canvas.addEventListener('touchend', handleEnd);
            canvas.addEventListener('touchcancel', handleEnd);
            
            document.getElementById('resetBtn').addEventListener('click', () => {
                resetMask();
            });
        }
        
        // Esperar a que el DOM esté listo
        window.addEventListener('load', () => {
            bindEvents();
        });
    })();
</script>
</body>
</html>
