<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Día 1 · Rasca y Gana </title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: auto;
            border-radius: 24px;
            cursor: grab;
            touch-action: none;
            background: #2a2a2a;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 10px;
            color: #8bffa0;
            font-size: 14px;
        }
        .reset-btn {
            background: #2a2a2a;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            cursor: pointer;
        }
        .chocolate-message {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffaa33;
            color: #5a2a00;
            padding: 20px 30px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.8rem;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 0 30px gold;
            animation: pop 0.5s ease-out;
            font-family: monospace;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="info">
        <span>🍫 RASCA · GANA UN CHOCOLATE</span>
        <span>RESIDUO: <span id="percent">100</span>%</span>
    </div>
    <canvas id="scratchCanvas" width="500" height="500"></canvas>
    <div style="text-align: center; margin-top: 12px;">
        <button class="reset-btn" id="resetBtn">⟳ REINICIAR</button>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const percentSpan = document.getElementById('percent');
        let hiddenImg = null;
        let currentMaskCanvas = null;
        let originalMaskData = null;
        let chocolateShown = false;

        const BRUSH_RADIUS = 28;
        const W = 500, H = 500;
        canvas.width = W;
        canvas.height = H;

        // Imagen oculta (sorpresa: puedes cambiar la URL por una foto)
        const SORPRESA_URL = 'https://picsum.photos/id/26/500/500'; // Cambiar por tu foto

        // Generar máscara metálica
        function generateMetalMask() {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = W;
            offCanvas.height = H;
            const offCtx = offCanvas.getContext('2d');
            offCtx.fillStyle = '#2c2e3a';
            offCtx.fillRect(0, 0, W, H);
            for (let i = 0; i < 1500; i++) {
                offCtx.fillStyle = `rgba(100,110,130,${Math.random() * 0.5})`;
                offCtx.fillRect(Math.random() * W, Math.random() * H, 2, 2);
            }
            return offCanvas;
        }

        function drawFullScene() {
            if (!hiddenImg) return;
            ctx.clearRect(0, 0, W, H);
            ctx.drawImage(hiddenImg, 0, 0, W, H);
            if (currentMaskCanvas) ctx.drawImage(currentMaskCanvas, 0, 0);
        }

        function updatePercent() {
            if (!currentMaskCanvas) return;
            const maskCtx = currentMaskCanvas.getContext('2d');
            const imgData = maskCtx.getImageData(0, 0, W, H);
            let opaque = 0;
            for (let i = 3; i < imgData.data.length; i += 4) {
                if (imgData.data[i] > 10) opaque++;
            }
            let pct = Math.floor((opaque / (W * H)) * 100);
            pct = Math.max(0, pct);
            percentSpan.innerText = pct;

            // Si llegó a 0% y no se mostró chocolate
            if (pct === 0 && !chocolateShown) {
                chocolateShown = true;
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chocolate-message';
                msgDiv.innerHTML = '🍫 ¡SE HIZO ACREEDORA DE UN CHOCOLATE! 🍫';
                document.body.appendChild(msgDiv);
                setTimeout(() => msgDiv.remove(), 4000);
                if (navigator.vibrate) navigator.vibrate([200,100,200]);
            }
        }

        function scratchAt(x, y) {
            if (!currentMaskCanvas) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (x - rect.left) * scaleX;
            let canvasY = (y - rect.top) * scaleY;
            if (canvasX < 0 || canvasX > W || canvasY < 0 || canvasY > H) return;
            const maskCtx = currentMaskCanvas.getContext('2d');
            maskCtx.globalCompositeOperation = 'destination-out';
            maskCtx.beginPath();
            maskCtx.arc(canvasX, canvasY, BRUSH_RADIUS, 0, Math.PI*2);
            maskCtx.fill();
            maskCtx.globalCompositeOperation = 'source-over';
            drawFullScene();
            updatePercent();
        }

        // Eventos táctiles y ratón
        let dragging = false;
        let lastX = 0, lastY = 0;
        function start(e) {
            e.preventDefault();
            dragging = true;
            const p = getPoint(e);
            lastX = p.x; lastY = p.y;
            scratchAt(lastX, lastY);
        }
        function move(e) {
            if (!dragging) return;
            e.preventDefault();
            const p = getPoint(e);
            const steps = Math.hypot(p.x - lastX, p.y - lastY);
            if (steps > 0) {
                for (let i = 0; i <= steps; i += 5) {
                    const t = i / steps;
                    const ix = lastX + (p.x - lastX) * t;
                    const iy = lastY + (p.y - lastY) * t;
                    scratchAt(ix, iy);
                }
            } else scratchAt(p.x, p.y);
            lastX = p.x; lastY = p.y;
        }
        function end(e) { dragging = false; e.preventDefault(); }
        function getPoint(e) {
            let cx, cy;
            if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            return { x: cx, y: cy };
        }
        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start, { passive: false });
        canvas.addEventListener('touchmove', move, { passive: false });
        canvas.addEventListener('touchend', end);

        // Cargar imagen y empezar
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            hiddenImg = img;
            const maskCanvas = generateMetalMask();
            currentMaskCanvas = maskCanvas;
            originalMaskData = currentMaskCanvas.getContext('2d').getImageData(0,0,W,H);
            drawFullScene();
            updatePercent();
        };
        img.src = SORPRESA_URL;
        document.getElementById('resetBtn').onclick = () => {
            if (originalMaskData) {
                const mCtx = currentMaskCanvas.getContext('2d');
                mCtx.putImageData(originalMaskData, 0, 0);
                drawFullScene();
                updatePercent();
                chocolateShown = false;
            }
        };
    })();
</script>
</body>
</html>
