<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Día 4 · Portal Inmersivo · Calendario Tecnológico</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        .instruction {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 8px;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(5px);
            font-family: monospace;
        }
        @media (max-width: 600px) {
            .instruction { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="instruction">🌀 GIRA EL TELÉFONO 360° · MIRA HACIA ARRIBA PARA LA CARTA 🌀</div>
    
    <a-scene vr-mode-ui="enabled: true" device-orientation-permission-ui="enabled: true" embedded>
        <!-- Entorno 360° con una imagen equirectangular (puedes cambiarla por una foto real 360) -->
        <a-sky src="https://cdn.aframe.io/360-image-gallery/img/3.jpg" rotation="0 -90 0"></a-sky>
        
        <!-- Suelo con rejilla tecnológica -->
        <a-grid position="0 -1.5 0" width="20" depth="20" color="#2266aa" opacity="0.3"></a-grid>
        
        <!-- Luces ambientales -->
        <a-light type="ambient" intensity="0.5" color="#445566"></a-light>
        <a-light type="point" intensity="1.2" position="2 3 4" color="#ffaa88"></a-light>
        
        <!-- Objeto flotante 1: Logo de Mobile Legends (con texto) -->
        <a-text value="🎮 MLBB 🎮" align="center" scale="1.2 1.2 0.5" position="-2 1.5 -3" color="#ffd966" font="mozillavr"></a-text>
        
        <!-- Objeto flotante 2: Logo de Fénix Basketball -->
        <a-text value="🏀 FÉNIX BC 🏀" align="center" scale="1.2 1.2 0.5" position="3 1.2 -2" color="#ff8844" font="mozillavr"></a-text>
        
        <!-- Foto de ustedes (sprite plano) -->
        <a-image src="https://picsum.photos/id/20/512/512" position="-1 1.8 -4" width="1.5" height="1.5" rotation="0 30 0"></a-image>
        <!-- Mejor si cambias la URL por una imagen real de ustedes -->
        
        <!-- Frase flotante -->
        <a-text value="✦ Nuestro universo paralelo ✦" align="center" scale="1 1 0.5" position="0 2.2 -5" color="#88ccff" font="mozillavr"></a-text>
        
        <!-- FRASE en otra esquina -->
        <a-text value="∞ Código y Corazón ∞" align="center" scale="0.8 0.8 0.5" position="3 0.5 -5" color="#aaffaa" font="mozillavr"></a-text>
        
        <!-- CARTA DEL DÍA (escondida mirando hacia ARRIBA) -->
        <!-- Está en el techo virtual, hay que mirar hacia arriba para verla -->
        <a-text value="📜 CARTA DÍA 4 📜" align="center" scale="1.5 1.5 0.5" position="0 3.5 -2" color="#ffaa88" font="mozillavr"
                animation="property: scale; to: 1.7 1.7 0.5; dur: 1200; dir: alternate; loop: true"></a-text>
        <a-text value="'La ingeniería crea puentes, pero tú creaste mi mundo' ❤️" align="center" scale="0.9 0.9 0.5" position="0 2.8 -2" color="#ffdd99" font="mozillavr"></a-text>
        
        <!-- Efecto de partículas alrededor (estrellas) -->
        <a-entity position="0 0 -5" geometry="primitive: sphere; radius: 0.05" material="color: #88aaff; shader: flat"
                  repeat="150" position-randomizer="distribution: spherical; radius: 8"></a-entity>
        
        <!-- Sonido ambiental (opcional, requiere interacción del usuario) -->
        <!-- <a-sound src="url(../assets/ambient.mp3)" autoplay="true" loop="true" volume="0.3"></a-sound> -->
        
        <!-- Cursor para móvil (mira y toca) -->
        <a-camera>
            <a-cursor color="#0ff" fuse="true" timeout="1500"></a-cursor>
        </a-camera>
    </a-scene>

    <script>
        // Pequeño script para notificar consola
        console.log("%c🌀 Día 4: Portal 360° activo | Busca la carta en el techo", "color: #88ffaa; font-size: 14px");
        if (navigator.vibrate) navigator.vibrate(200);
    </script>
</body>
</html>
