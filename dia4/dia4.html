<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Día 4 · Disparo al blanco</title>
    <style>
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: monospace;
        }
        .game-container {
            background: #11151f;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
        }
        canvas {
            background: #1e2a2e;
            border-radius: 24px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            height: auto;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #2affb6;
            font-size: 1.2rem;
        }
        button {
            margin-top: 15px;
            background: #ff8844;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats">
        <span>🎯 Aciertos: <span id="score">0</span></span>
        <span>💥 Fallos: <span id="misses">0</span></span>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <button id="resetGame">🔫 REINICIAR JUEGO</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('score');
    const missesSpan = document.getElementById('misses');
    let score = 0;
    let misses = 0;
    let targets = [];
    let gameRunning = true;
    let animationId = null;

    const TARGET_RADIUS = 28;
    const MAX_TARGETS = 5;
    const SPAWN_RATE = 40; // frames
    let frameCounter = 0;

    function randomPos() {
        return {
            x: Math.random() * (canvas.width - 2*TARGET_RADIUS) + TARGET_RADIUS,
            y: Math.random() * (canvas.height - 2*TARGET_RADIUS) + TARGET_RADIUS,
            life: 120 // frames antes de desaparecer
        };
    }

    function addTarget() {
        if (targets.length < MAX_TARGETS) {
            targets.push(randomPos());
        }
    }

    function updateTargets() {
        for (let i = 0; i < targets.length; i++) {
            targets[i].life--;
            if (targets[i].life <= 0) {
                targets.splice(i,1);
                misses++;
                missesSpan.innerText = misses;
                i--;
            }
        }
    }

    function drawTargets() {
        for (let t of targets) {
            // dibujar diana
            ctx.beginPath();
            ctx.arc(t.x, t.y, TARGET_RADIUS, 0, Math.PI*2);
            ctx.fillStyle = '#ff3366';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(t.x, t.y, TARGET_RADIUS-8, 0, Math.PI*2);
            ctx.fillStyle = '#ffcc88';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(t.x, t.y, TARGET_RADIUS-16, 0, Math.PI*2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();
            // ojos para darle gracia
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(t.x-10, t.y-8, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(t.x+10, t.y-8, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(t.x-10, t.y-8, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(t.x+10, t.y-8, 2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function drawBackground() {
        ctx.fillStyle = '#1e2a2e';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#2affb6';
        ctx.lineWidth = 2;
        ctx.strokeRect(5,5,canvas.width-10,canvas.height-10);
    }

    function gameLoop() {
        if (!gameRunning) return;
        drawBackground();
        updateTargets();
        drawTargets();
        frameCounter++;
        if (frameCounter >= SPAWN_RATE) {
            frameCounter = 0;
            addTarget();
        }
        animationId = requestAnimationFrame(gameLoop);
    }

    function shoot(e) {
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const mouseX = (clientX - rect.left) * scaleX;
        const mouseY = (clientY - rect.top) * scaleY;
        let hit = false;
        for (let i=0; i<targets.length; i++) {
            const dx = mouseX - targets[i].x;
            const dy = mouseY - targets[i].y;
            const dist = Math.hypot(dx,dy);
            if (dist < TARGET_RADIUS) {
                targets.splice(i,1);
                score++;
                scoreSpan.innerText = score;
                hit = true;
                if (navigator.vibrate) navigator.vibrate(50);
                if (score >= 10) {
                    gameRunning = false;
                    cancelAnimationFrame(animationId);
                    ctx.font = "30px monospace";
                    ctx.fillStyle = "#ffdd88";
                    ctx.shadowBlur = 0;
                    ctx.fillText("🎉 ¡VICTORIA! 🎉", canvas.width/2-120, canvas.height/2);
                    ctx.font = "16px monospace";
                    ctx.fillText("Ganaste un chocolate ❤️", canvas.width/2-100, canvas.height/2+50);
                }
                break;
            }
        }
        if (!hit && !gameRunning) return;
        // Efecto de disparo: circulito
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,200,0.8)';
        ctx.fill();
    }

    function resetGame() {
        if (animationId) cancelAnimationFrame(animationId);
        score = 0;
        misses = 0;
        targets = [];
        frameCounter = 0;
        gameRunning = true;
        scoreSpan.innerText = score;
        missesSpan.innerText = misses;
        gameLoop();
    }

    canvas.addEventListener('mousedown', shoot);
    canvas.addEventListener('touchstart', shoot, { passive: false });
    document.getElementById('resetGame').onclick = resetGame;
    resetGame();
</script>
</body>
</html>
