<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Día 3 · Visión Cyberpunk · Calendario Tecnológico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Courier New', 'Fira Code', monospace;
            background: #000;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* para que no interfiera con la cámara */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .status-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0f0;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 3;
            font-family: monospace;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0,255,255,0.6);
            box-shadow: 0 0 10px cyan;
            z-index: 4;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .corner-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid #0ff;
            filter: drop-shadow(0 0 5px #0ff);
            z-index: 3;
            pointer-events: none;
        }
        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="status-text" id="status">🔍 INICIALIZANDO SENSORES...</div>
    <div class="scan-line"></div>
    <div class="corner-marker corner-tl"></div>
    <div class="corner-marker corner-tr"></div>
    <div class="corner-marker corner-bl"></div>
    <div class="corner-marker corner-br"></div>

    <script>
        (function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('overlay');
            const ctx = canvas.getContext('2d');
            const statusDiv = document.getElementById('status');

            // Coordenadas personalizadas de Tulcán (Ecuador)
            const TULCAN_LAT = 0.8123;
            const TULCAN_LON = -77.7171;
            
            // Variables para animación de líneas de código
            let frame = 0;
            let animationId = null;
            let streamActive = true;

            // Inicializar cámara trasera si es posible
            async function initCamera() {
                try {
                    const constraints = {
                        video: {
                            facingMode: { exact: "environment" }, // cámara trasera
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    await video.play();
                    statusDiv.innerHTML = "✅ SISTEMA OPERATIVO // TARGET: DANI";
                    startOverlay();
                } catch (err) {
                    // Fallback a cámara frontal o cualquier cámara
                    console.warn("Cámara trasera no disponible, usando frontal", err);
                    try {
                        const constraints = { video: true };
                        const stream = await navigator.mediaDevices.getUserMedia(constraints);
                        video.srcObject = stream;
                        await video.play();
                        statusDiv.innerHTML = "⚠️ MODO FRONTAL // ANALIZANDO...";
                        startOverlay();
                    } catch (e) {
                        statusDiv.innerHTML = "❌ ERROR: CÁMARA NO ACCESIBLE";
                        console.error(e);
                    }
                }
            }

            function startOverlay() {
                // Ajustar tamaño del canvas al video
                function resizeCanvas() {
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    canvas.width = w;
                    canvas.height = h;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                // Función de dibujo HUD cyberpunk
                function drawHUD() {
                    if (!streamActive) return;
                    if (!ctx) return;
                    
                    const w = canvas.width;
                    const h = canvas.height;
                    
                    // Limpiar con transparencia
                    ctx.clearRect(0, 0, w, h);
                    
                    // ---- 1. Bordes tecnológicos (marcos) ----
                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 0;
                    // Rectángulo interno con esquinas recortadas
                    const margin = 30;
                    ctx.strokeRect(margin, margin, w - margin*2, h - margin*2);
                    
                    // Líneas de datos (patrón de rejilla)
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
                    ctx.setLineDash([5, 15]);
                    for (let i = 0; i < 6; i++) {
                        ctx.beginPath();
                        ctx.moveTo(margin + (i * (w - margin*2)/5), margin);
                        ctx.lineTo(margin + (i * (w - margin*2)/5), h - margin);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(margin, margin + (i * (h - margin*2)/5));
                        ctx.lineTo(w - margin, margin + (i * (h - margin*2)/5));
                        ctx.stroke();
                    }
                    ctx.setLineDash([]);
                    
                    // ---- 2. Código flotante (líneas de texto animadas) ----
                    ctx.font = '12px "Courier New", monospace';
                    ctx.fillStyle = '#8affc0';
                    ctx.shadowBlur = 0;
                    const codeLines = [
                        "> scan.exe --target DANI",
                        "> localization: TULCAN, EC",
                        `> lat: ${TULCAN_LAT} lon: ${TULCAN_LON}`,
                        "> decrypting memories...",
                        "> conexión establecida ❤️",
                        "> nivel de confianza: 100%",
                        "> // ING.EXE // build: 2025",
                        "> mobile_legends.status = ONLINE",
                        "> basket_fenix.energy = ∞"
                    ];
                    for (let i = 0; i < codeLines.length; i++) {
                        const y = margin + 40 + (i * 22) + (frame % 60) * 0.2;
                        if (y < h - margin) {
                            ctx.fillText(codeLines[i], margin + 10, y);
                        }
                    }
                    
                    // ---- 3. Pop-ups dinámicos "ANALYZING..." ----
                    const now = Date.now() / 300;
                    const pop1X = w * 0.2 + Math.sin(now) * 10;
                    const pop1Y = h * 0.3 + Math.cos(now*1.3) * 8;
                    ctx.fillStyle = '#ffaa33';
                    ctx.font = 'bold 16px monospace';
                    ctx.fillText("🔬 ANALYZING...", pop1X, pop1Y);
                    
                    const pop2X = w * 0.7 + Math.sin(now*0.7) * 12;
                    const pop2Y = h * 0.6 + Math.cos(now*0.9) * 10;
                    ctx.fillStyle = '#ff66cc';
                    ctx.fillText("🎯 TARGET: DANI", pop2X, pop2Y);
                    
                    // ---- 4. Coordenadas en tiempo real (simulación) ----
                    ctx.font = '10px monospace';
                    ctx.fillStyle = '#88ffaa';
                    ctx.fillText(`LAT: ${TULCAN_LAT.toFixed(4)} | LON: ${TULCAN_LON.toFixed(4)} | ALT: 2950m`, w-280, h-20);
                    
                    // ---- 5. Indicador de pulso cardíaco estético ----
                    const pulse = (Math.sin(Date.now() / 200) + 1) / 2;
                    ctx.fillStyle = `rgba(255, 80, 120, ${0.3 + pulse*0.4})`;
                    ctx.beginPath();
                    ctx.arc(w-50, 60, 20 + pulse*5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px monospace';
                    ctx.fillText("❤️", w-58, 67);
                    
                    frame++;
                    requestAnimationFrame(drawHUD);
                }
                
                drawHUD();
            }

            // Efecto de vibración al entrar (si soporta)
            if (navigator.vibrate) navigator.vibrate(100);
            
            // Mensaje en consola
            console.log("%c🔮 Día 3: Visión Cyberpunk activa | Cámara + HUD técnico", "color: #0ff; font-size: 14px");
            
            initCamera();
        })();
    </script>
</body>
</html>
