<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Día 3 · Adivina la palabra</title>
    <style>
        body {
            background: radial-gradient(circle at 20% 30%, #0a1a2a, #010101);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 2rem;
            text-align: center;
            border: 1px solid #2affb6;
            max-width: 500px;
            width: 100%;
        }
        .word-display {
            font-size: 2.5rem;
            letter-spacing: 12px;
            color: #ffdd99;
            margin: 20px 0;
            word-break: break-all;
        }
        .letters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letter-btn {
            background: #1a2a3a;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
        }
        .letter-btn.disabled {
            background: #3a4a5a;
            opacity: 0.5;
            cursor: default;
        }
        .message {
            font-size: 1.2rem;
            margin-top: 20px;
            color: #ffaa88;
        }
        button.reset {
            background: #ff6644;
            padding: 10px 20px;
            border-radius: 40px;
            margin-top: 20px;
            border: none;
            font-family: monospace;
            font-weight: bold;
        }
        .attempts {
            color: #88ffaa;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 ADIVINA LA PALABRA CLAVE</h2>
    <p class="attempts">Intentos restantes: <span id="attemptsLeft">6</span></p>
    <div class="word-display" id="wordDisplay"></div>
    <div class="letters" id="lettersContainer"></div>
    <div class="message" id="message"></div>
    <button class="reset" id="resetGame">🔄 NUEVO JUEGO</button>
</div>

<script>
    // Lista de posibles palabras (escoje una o varias)
    const WORDS = ["SINCRONIA", "INFINITO", "CORAZON", "INGENIERA", "MAGNETISMO"];
    let currentWord = "";
    let guessedLetters = [];
    let attempts = 6;
    let gameOver = false;

    const wordDisplay = document.getElementById('wordDisplay');
    const attemptsSpan = document.getElementById('attemptsLeft');
    const messageDiv = document.getElementById('message');
    const lettersContainer = document.getElementById('lettersContainer');

    function selectRandomWord() {
        return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function updateDisplay() {
        let display = "";
        for (let letter of currentWord) {
            if (guessedLetters.includes(letter)) display += letter + " ";
            else display += "_ ";
        }
        wordDisplay.innerText = display.trim();
    }

    function checkWin() {
        const allGuessed = currentWord.split('').every(l => guessedLetters.includes(l));
        if (allGuessed && !gameOver) {
            messageDiv.innerHTML = "🎉 ¡FELICIDADES! Has descifrado el código secreto. 🎉<br>✨ Un abrazo y un chocolate imaginario ✨";
            gameOver = true;
            if (navigator.vibrate) navigator.vibrate(200);
        }
    }

    function attemptLetter(letter) {
        if (gameOver) return;
        if (guessedLetters.includes(letter)) {
            messageDiv.innerHTML = "⚠️ Ya probaste esa letra.";
            return;
        }
        guessedLetters.push(letter);
        if (currentWord.includes(letter)) {
            messageDiv.innerHTML = "✅ ¡Bien! La letra está en la palabra.";
            updateDisplay();
            checkWin();
        } else {
            attempts--;
            attemptsSpan.innerText = attempts;
            messageDiv.innerHTML = "❌ Letra incorrecta.";
            if (attempts === 0) {
                messageDiv.innerHTML = `💀 Sin intentos. La palabra era: ${currentWord}. 💀<br>Pero un chocolate de consolación igual. 🍫`;
                gameOver = true;
            }
        }
        updateLettersUI();
    }

    function updateLettersUI() {
        const allLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        lettersContainer.innerHTML = '';
        allLetters.forEach(letter => {
            const btn = document.createElement('button');
            btn.innerText = letter;
            btn.classList.add('letter-btn');
            if (guessedLetters.includes(letter) || gameOver) {
                btn.disabled = true;
                btn.classList.add('disabled');
            } else {
                btn.onclick = () => attemptLetter(letter);
            }
            lettersContainer.appendChild(btn);
        });
    }

    function resetGame() {
        currentWord = selectRandomWord();
        guessedLetters = [];
        attempts = 6;
        gameOver = false;
        attemptsSpan.innerText = attempts;
        messageDiv.innerHTML = "";
        updateDisplay();
        updateLettersUI();
    }

    resetGame();
    document.getElementById('resetGame').onclick = resetGame;
</script>
</body>
</html>
