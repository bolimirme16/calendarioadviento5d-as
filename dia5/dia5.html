<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Día 5 · Corazón 3D · El Gran Final</title>
    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        model-viewer {
            width: 100%;
            height: 60vh;
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(255, 80, 120, 0.3);
            margin-bottom: 20px;
        }
        .title {
            color: #ff88aa;
            text-shadow: 0 0 8px #ff0066;
            font-size: 1.8rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .sub {
            color: #ccc;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(45deg, #ff3366, #ff6680);
            border: none;
            color: white;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:active {
            transform: scale(0.96);
        }
        .info {
            margin-top: 20px;
            font-size: 11px;
            color: #aaa;
        }
        @media (max-width: 600px) {
            model-viewer { height: 50vh; }
            .title { font-size: 1.4rem; }
            button { font-size: 1rem; padding: 12px 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">❤️ CORAZÓN 3D ❤️</div>
    <div class="sub">"Un pedazo de mi código y mi corazón para ti"</div>
    
    <model-viewer 
        id="heart-model"
        src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Heart.glb"
        alt="Corazón 3D con latido"
        ar 
        ar-modes="webxr scene-viewer quick-look"
        camera-controls 
        auto-rotate 
        rotation-per-second="10deg"
        scale="1.2 1.2 1.2"
        shadow-intensity="1"
        exposure="1.2"
        environment-image="neutral"
        style="background-color: #110022;">
        
        <div class="progress-bar hide" slot="progress-bar">
            <div class="update-bar"></div>
        </div>
        
        <!-- Botón personalizado para AR -->
        <button slot="ar-button" id="arButton" style="background-color: #ff3366; border-radius: 40px;">
            📸 PONER EN MI MUNDO
        </button>
    </model-viewer>
    
    <button id="captureBtn">📷 CAPTURAR MOMENTO</button>
    <div class="info">Toca "PONER EN MI MUNDO" para ver el corazón en tu entorno real (AR). Luego puedes capturar pantalla.</div>
</div>

<script>
    const modelViewer = document.getElementById('heart-model');
    const captureBtn = document.getElementById('captureBtn');
    
    // Efecto de latido: animar escala suavemente (simulación, si el modelo no tiene animación)
    let beat = true;
    setInterval(() => {
        if (modelViewer && modelViewer.scale) {
            const scale = beat ? '1.25 1.25 1.25' : '1.15 1.15 1.15';
            modelViewer.scale = scale;
            beat = !beat;
        }
    }, 600);
    
    // Función para capturar foto (sencilla: captura el canvas del model-viewer)
    captureBtn.addEventListener('click', () => {
        // Tomar un screenshot del model-viewer
        const canvas = document.createElement('canvas');
        const width = modelViewer.clientWidth;
        const height = modelViewer.clientHeight;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        
        // Capturar el contenido del model-viewer (esto es aproximado, funciona si se usa WebGL)
        // model-viewer no expone directamente un método, pero se puede hacer con html2canvas? Mejor usamos la API de captura de medios?
        // Simplifico: indicamos que puede hacer screenshot nativo (alert para que ella use botón físico)
        alert("📸 Toca el botón de 'Captura de pantalla' de tu teléfono para guardar este momento. ✨ El corazón late por ti.");
        
        // Vibración
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    });
    
    // Añadir efecto de brillo al iniciar
    setTimeout(() => {
        modelViewer.style.boxShadow = "0 0 40px rgba(255, 80, 120, 0.8)";
        if (navigator.vibrate) navigator.vibrate(200);
    }, 500);
    
    console.log("%c❤️ Día 5: Corazón 3D activo | Realidad Aumentada lista", "color: #ff66aa; font-size: 16px");
</script>
</body>
</html>
