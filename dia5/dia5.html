<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Día 5 · Corazón Bonito como el suyo mi amor </title>
    <style>
        body {
            background: linear-gradient(145deg, #1a0a1a, #2a1020);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .message {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff99cc;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            font-size: 1rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="heartCanvas"></canvas>
<div class="message">❤️ PRESIONE EL CORAZÓN PARA UNA SORPRESA ❤️</div>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let heartPoints = [];
    let pulseScale = 1;
    let pulseDirection = 0.02;
    let particles = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        generateHeartPoints();
    }

    // ecuación paramétrica del corazón
    function generateHeartPoints() {
        heartPoints = [];
        for (let t = 0; t <= Math.PI * 2; t += 0.05) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            // escalar y centrar
            let px = width/2 + x * 12 * pulseScale;
            let py = height/2 - y * 12 * pulseScale;
            heartPoints.push({x: px, y: py});
        }
    }

    function drawHeart() {
        if (heartPoints.length < 2) return;
        ctx.clearRect(0, 0, width, height);
        // gradiente
        const grad = ctx.createLinearGradient(width/2, height/2-50, width/2, height/2+50);
        grad.addColorStop(0, '#ff3366');
        grad.addColorStop(1, '#ff88aa');
        ctx.beginPath();
        ctx.moveTo(heartPoints[0].x, heartPoints[0].y);
        for (let i = 1; i < heartPoints.length; i++) {
            ctx.lineTo(heartPoints[i].x, heartPoints[i].y);
        }
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff3377';
        // brillo blanco interior
        ctx.beginPath();
        for (let i = 0; i < heartPoints.length; i+=2) {
            ctx.moveTo(heartPoints[i].x, heartPoints[i].y);
        }
        ctx.fillStyle = 'rgba(255,200,210,0.4)';
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function drawParticles() {
        for (let i=0; i<particles.length; i++) {
            const p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, ${100+Math.random()*100}, 150, ${p.life})`;
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) {
                particles.splice(i,1);
                i--;
            }
        }
    }

    function burstParticles(x, y) {
        for (let i=0; i<60; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                size: Math.random() * 8 + 2,
                life: 0.8
            });
        }
    }

    function animateHeartbeat() {
        pulseScale += pulseDirection;
        if (pulseScale >= 1.1) pulseDirection = -0.01;
        if (pulseScale <= 0.95) pulseDirection = 0.01;
        generateHeartPoints();
        drawHeart();
        drawParticles();
        requestAnimationFrame(animateHeartbeat);
    }

    function handleTap(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        // sencilla detección dentro del corazón: usamos distancia aproximada al centro
        const centerX = width/2;
        const centerY = height/2;
        const dist = Math.hypot(x - centerX, y - centerY);
        if (dist < 100) {
            burstParticles(x, y);
            // mostrar mensaje flotante
            const msgDiv = document.createElement('div');
            msgDiv.innerText = '💖 TE AMO 💖';
            msgDiv.style.position = 'fixed';
            msgDiv.style.left = `${clientX-50}px`;
            msgDiv.style.top = `${clientY-50}px`;
            msgDiv.style.color = '#ff99cc';
            msgDiv.style.fontSize = '2rem';
            msgDiv.style.fontWeight = 'bold';
            msgDiv.style.textShadow = '0 0 10px red';
            msgDiv.style.pointerEvents = 'none';
            msgDiv.style.zIndex = 100;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 1500);
            if (navigator.vibrate) navigator.vibrate(100);
        }
    }

    window.addEventListener('resize', () => { resizeCanvas(); generateHeartPoints(); });
    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', handleTap, { passive: false });
    resizeCanvas();
    animateHeartbeat();
</script>
</body>
</html>
